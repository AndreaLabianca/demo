title = "Custom Gitleaks rules"

[extend]
useDefault = true

[[rules]]
id = "generic-property-password"
description = "Password hardcoded in properties/config files"
regex = '''(?i)(password|passwd|pwd|secret|token|api[_-]?key)\s*[:=]\s*['"]?([^\s'"]{4,})['"]?'''
secretGroup = 2
keywords = [
    "password",
    "passwd",
    "secret",
    "token",
    "api_key",
    "apikey",
    "spring.datasource.password"
]